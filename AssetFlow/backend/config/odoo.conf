[options]
; -----------------------------------------------------------------------
; AssetFlow – Odoo 18 Configuration
; Environment: Development
; -----------------------------------------------------------------------

; --- Server ---
http_port = ${PORT}
workers = 0
; Long-polling disabled in dev (no gevent worker required)
longpolling_port = False

; --- Database ---
db_host = ${PGHOST}
db_port = ${PGPORT}
db_user = ${PGUSER}
db_password = ${PGPASSWORD}
db_name = assetflow_odoo

; --- Addons ---
addons_path = %(here)s/../odoo/odoo-src/addons,%(here)s/../odoo/custom_addons

; --- Logging ---
log_level = info
log_handler = :INFO
logfile = False

; --- Security ---
list_db = False

; --- Performance ---
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200
limit_time_real_real = -1

; --- Session ---
session_expiration = 43200
